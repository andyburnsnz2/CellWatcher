; LilyGO T-CAN485 — CAN bus sniffer firmware.
; File-based project (this .ini + src/), no IDE solution file — see ../README.md.
;
; Board/platform/partition settings match LilyGO's own reference project for this exact board
; (Xinyuan-LilyGO/T-CAN485), confirmed against their example code — PlatformIO has no
; board-specific entry for the T-CAN485, so the generic esp32dev board definition is correct here
; (it targets the same ESP32 module; the board-specific parts are the GPIO pin numbers in
; src/pins.h, not anything PlatformIO's "board" setting controls).
[env:esp32dev]
platform = espressif32@6.11.0
framework = arduino
board = esp32dev
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
; Drives the T-CAN485's onboard WS2812 status LED — same library LilyGO's own reference example
; for this board uses (examples/WS2812B_Blink), not an arbitrary choice.
lib_deps = fastled/FastLED@^3.7.0
