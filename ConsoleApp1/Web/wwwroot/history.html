<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CellWatcher — History</title>
<link rel="icon" href="/img/cellkeeper.png">
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html{overflow-y:scroll}
body{margin:0;background:#000;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
a{text-decoration:none}
nav{background:#111;border-bottom:1px solid #222;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 1.5rem;height:96px;display:flex;align-items:center;gap:1rem}
.brand-logo{height:80px;width:80px;border-radius:14px;flex-shrink:0;border:2px solid rgba(110,198,42,.7);box-shadow:0 0 28px rgba(110,198,42,.75),0 0 8px rgba(110,198,42,1),0 0 50px rgba(110,198,42,.25)}
.brand{color:#6ec62a;font-weight:700;font-size:1.2rem;margin-right:.25rem}
.nav-inner a{color:#888;padding:.25rem .6rem;border-radius:4px;font-size:.85rem}
.nav-inner a:hover,.nav-inner a.on{background:#222;color:#f0f0f0}
.ml{margin-left:auto}
.page{max-width:1400px;margin:0 auto;padding:1.25rem}
.card{background:#111;border:1px solid #222;border-radius:8px;padding:1rem}
.card-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:#555;margin-bottom:.5rem}
.muted{color:#555}
.mt2{margin-top:1rem}
.range-btns{display:flex;gap:.4rem}
.range-btn{background:#0a0a0a;border:1px solid #222;color:#888;padding:.25rem .75rem;border-radius:4px;cursor:pointer;font-size:.8rem;transition:all .15s}
.range-btn:hover{border-color:#555;color:#e0e0e0}
.range-btn.active{background:#6ec62a;border-color:#6ec62a;color:#000;font-weight:600}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.loading{display:flex;align-items:center;justify-content:center;height:180px;color:#555}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <img src="/img/cellkeeper.png" class="brand-logo" alt="CellWatcher">
    <span class="brand">CellWatcher</span>    <a href="/">Dashboard</a>
    <a href="/cells.html">Cells</a>
    <a href="/history.html" class="on">History</a>
    <a href="/health.html">Health</a>
    <a href="/battery-balancing.html" id="nav-battery-balancing">Battery Balancing</a>
    <a href="/canbus.html">Canbus</a>
    <a href="/config.html">Config</a>
    <span class="ml muted" id="ts" style="font-size:.75rem"></span>
  </div>
</nav>
<div class="page">

  <!-- Time range selector -->
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
    <span style="font-size:.8rem;color:#888">Time range:</span>
    <div class="range-btns">
      <button class="range-btn" data-h="1">1h</button>
      <button class="range-btn active" data-h="6">6h</button>
      <button class="range-btn" data-h="24">24h</button>
      <button class="range-btn" data-h="168">7d</button>
    </div>
    <span class="ml muted" id="row-count" style="font-size:.75rem"></span>
  </div>

  <!-- Charts 2-column layout -->
  <div class="g2">
    <div class="card">
      <div class="card-title">State of Charge (%)</div>
      <div id="chart-soc"></div>
    </div>
    <div class="card">
      <div class="card-title">Pack Voltage (V)</div>
      <div id="chart-voltage"></div>
    </div>
  </div>

  <div class="g2 mt2">
    <div class="card">
      <div class="card-title">Pack Current (A) &amp; Power (kW)</div>
      <div id="chart-power"></div>
    </div>
    <div class="card">
      <div class="card-title">Cell Delta (mV)</div>
      <div id="chart-delta"></div>
    </div>
  </div>

  <div class="g2 mt2">
    <div class="card">
      <div class="card-title">Temperature (°C)</div>
      <div id="chart-temp"></div>
    </div>
    <div class="card">
      <div class="card-title">Min / Max Cell Voltage (V)</div>
      <div id="chart-cellrange"></div>
    </div>
  </div>

</div>
<script>
const baseOpts = {
  chart:{background:'transparent',toolbar:{show:false},animations:{enabled:false},zoom:{enabled:false}},
  xaxis:{type:'datetime',labels:{style:{colors:'#555'},datetimeUTC:false},axisBorder:{color:'#222'},axisTicks:{color:'#222'}},
  grid:{borderColor:'#1a1a1a'},
  theme:{mode:'dark'},
  tooltip:{theme:'dark',x:{format:'dd MMM HH:mm:ss'}},
  stroke:{curve:'smooth',width:2},
  legend:{labels:{colors:'#888'},fontSize:'12px'},
  noData:{text:'No data',style:{color:'#555'}}
};

function makeChart(id, extra) {
  const opts = Object.assign({}, baseOpts, extra);
  opts.chart = Object.assign({}, baseOpts.chart, extra.chart || {});
  opts.yaxis = extra.yaxis;
  const c = new ApexCharts(document.getElementById(id), opts);
  c.render();
  return c;
}

const charts = {
  soc: makeChart('chart-soc', {
    chart:{height:200},
    series:[{name:'SOC %',data:[]}],
    colors:['#6ec62a'],
    fill:{type:'gradient',gradient:{shadeIntensity:.4,opacityFrom:.6,opacityTo:.05,stops:[0,100]}},
    yaxis:{min:0,max:100,labels:{style:{colors:'#555'},formatter:v=>v.toFixed(0)+'%'}}
  }),
  voltage: makeChart('chart-voltage', {
    chart:{height:200},
    series:[{name:'Voltage V',data:[]}],
    colors:['#a78bfa'],
    yaxis:{labels:{style:{colors:'#555'},formatter:v=>v.toFixed(1)+'V'}}
  }),
  power: makeChart('chart-power', {
    chart:{height:200},
    series:[{name:'Current A',data:[]},{name:'Power kW',data:[]}],
    colors:['#f59e0b','#f87171'],
    yaxis:[
      {title:{text:'A',style:{color:'#555',fontSize:'11px'}},labels:{style:{colors:'#555'},formatter:v=>v.toFixed(0)}},
      {opposite:true,title:{text:'kW',style:{color:'#555',fontSize:'11px'}},labels:{style:{colors:'#555'},formatter:v=>v.toFixed(1)}}
    ]
  }),
  delta: makeChart('chart-delta', {
    chart:{height:200},
    series:[{name:'Delta mV',data:[]}],
    colors:['#fbbf24'],
    yaxis:{min:0,labels:{style:{colors:'#555'},formatter:v=>v.toFixed(1)+' mV'},
      title:{text:'mV',style:{color:'#555',fontSize:'11px'}}}
  }),
  temp: makeChart('chart-temp', {
    chart:{height:200},
    series:[{name:'Min °C',data:[]},{name:'Max °C',data:[]}],
    colors:['#34d399','#f87171'],
    yaxis:{labels:{style:{colors:'#555'},formatter:v=>v.toFixed(1)+'°'}}
  }),
  cellrange: makeChart('chart-cellrange', {
    chart:{height:200},
    series:[{name:'Min Cell V',data:[]},{name:'Max Cell V',data:[]}],
    colors:['#60a5fa','#f472b6'],
    yaxis:{labels:{style:{colors:'#555'},formatter:v=>v.toFixed(3)+'V'}}
  })
};

let currentHours = 6;

async function loadHistory(hours) {
  document.getElementById('ts').textContent = 'Loading…';
  const data = await fetch(`/api/pack/history?hours=${hours}`).then(r=>r.json()).catch(()=>[]);
  document.getElementById('ts').textContent = `${data.length} data points`;
  document.getElementById('row-count').textContent = `${data.length} readings`;

  const ts = r => new Date(r.readAt).getTime();

  charts.soc.updateSeries([{name:'SOC %', data:data.map(r=>[ts(r), r.socPercent])}]);
  charts.voltage.updateSeries([{name:'Voltage V', data:data.map(r=>[ts(r), r.packVoltageV])}]);
  charts.power.updateSeries([
    {name:'Current A', data:data.map(r=>[ts(r), r.packCurrentA])},
    {name:'Power kW',  data:data.map(r=>[ts(r), r.packPowerW!=null ? +r.packPowerW/1000 : null])}
  ]);
  charts.delta.updateSeries([{name:'Delta mV', data:data.map(r=>[ts(r), r.cellDeltaMv])}]);
  charts.temp.updateSeries([
    {name:'Min °C', data:data.map(r=>[ts(r), r.temperatureMinC])},
    {name:'Max °C', data:data.map(r=>[ts(r), r.temperatureMaxC])}
  ]);
  charts.cellrange.updateSeries([
    {name:'Min Cell V', data:data.map(r=>[ts(r), r.minCellV])},
    {name:'Max Cell V', data:data.map(r=>[ts(r), r.maxCellV])}
  ]);
}

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentHours = +btn.dataset.h;
    loadHistory(currentHours);
  });
});

loadHistory(currentHours);

// Battery Balancing depends entirely on the fake meter — hide its nav link when disabled.
fetch('/api/froniusmeter/status').then(r => r.ok ? r.json() : null).catch(() => null).then(d => {
  document.getElementById('nav-battery-balancing').style.display = d && d.enabled ? '' : 'none';
});
</script>
</body>
</html>
